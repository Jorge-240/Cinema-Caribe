{% extends 'base.html' %}
{% block title %}Registro — Cinema Caribe{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5"
     style="background:radial-gradient(ellipse at 50% 30%, rgba(232,88,10,.15) 0%, transparent 70%);">
  <div class="cc-auth-card fade-in-up">

    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Cinema Caribe" height="80" class="mb-3">
      <h2 style="font-family:var(--cc-font-title);letter-spacing:2px;">CREAR CUENTA</h2>
      <p class="text-muted small">Únete a Cinema Caribe</p>
    </div>

    <form method="POST" action="{{ url_for('auth.registro') }}">
      <div class="mb-3">
        <label class="cc-form-label"><i class="bi bi-person me-1"></i>Nombre completo</label>
        <input type="text" name="nombre" class="form-control cc-form-control"
               placeholder="Tu nombre" required autofocus>
      </div>
      <div class="mb-3">
        <label class="cc-form-label"><i class="bi bi-envelope me-1"></i>Email</label>
        <input type="email" name="email" class="form-control cc-form-control"
               placeholder="tu@email.com" required>
      </div>
      <div class="mb-3">
        <label class="cc-form-label"><i class="bi bi-lock me-1"></i>Contraseña</label>
        <input type="password" name="password" class="form-control cc-form-control"
               placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="cc-form-label"><i class="bi bi-lock-fill me-1"></i>Confirmar Contraseña</label>
        <input type="password" name="confirm_password" class="form-control cc-form-control"
               placeholder="Repite tu contraseña" required>
      </div>
      <button type="submit" class="cc-btn-primary w-100 justify-content-center py-3 mb-3">
        <i class="bi bi-person-plus"></i> Crear Cuenta
      </button>
    </form>

    <hr class="cc-separator">
    <div class="text-center">
      <p class="text-muted small mb-0">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('auth.login') }}" class="text-teal fw-700">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
