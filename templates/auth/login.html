{% extends 'base.html' %}
{% block title %}Ingresar — Cinema Caribe{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5"
     style="background:radial-gradient(ellipse at 50% 30%, rgba(10,126,140,.2) 0%, transparent 70%);">
  <div class="cc-auth-card fade-in-up">

    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Cinema Caribe" height="80" class="mb-3">
      <h2 style="font-family:var(--cc-font-title);letter-spacing:2px;">INICIAR SESIÓN</h2>
      <p class="text-muted small">Accede a tu cuenta Cinema Caribe</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="cc-form-label" for="email"><i class="bi bi-envelope me-1"></i>Email</label>
        <input type="email" id="email" name="email" class="form-control cc-form-control"
               placeholder="tu@email.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="cc-form-label" for="password"><i class="bi bi-lock me-1"></i>Contraseña</label>
        <div class="position-relative">
          <input type="password" id="password" name="password" class="form-control cc-form-control"
                 placeholder="••••••••" required>
          <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3"
                  onclick="togglePwd()" style="color:var(--cc-teal-light);">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="cc-btn-primary w-100 justify-content-center py-3 mb-3">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar
      </button>
    </form>

    <hr class="cc-separator">

    <div class="text-center">
      <p class="text-muted small mb-0">
        ¿No tienes cuenta?
        <a href="{{ url_for('auth.registro') }}" class="text-teal fw-700">Regístrate aquí</a>
      </p>
    </div>
  </div>
</div>
<script>
function togglePwd() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
